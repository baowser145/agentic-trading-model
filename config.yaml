# Default: paper only. Live requires explicit mode + agent-mediated execution.
trading_mode: paper  # paper | live

# Liquid day-trade universe. SPY = market filter; others are candidates.
# Selector agent ranks setups and picks the best new entry each tick.
symbols:
  - SPY
  - QQQ
  - IWM
  - AAPL
  - MSFT
  - NVDA
  - AMZN
  - META
  - GOOGL
  - TSLA

strategy:
  name: day_trade_playbook
  market_symbol: SPY
  sma_period: 10
  lookback_bars: 30
  range_lookback: 8
  pullback_tol_pct: 0.004

# "What to buy" agent — ranks multi-name setups; does not replace risk rails
selector:
  enabled: true
  max_new_entries_per_tick: 1   # pick the single best new name each tick
  prefer_relative_strength: true
  rs_lookback: 10

risk:
  risk_per_trade_pct: 0.05
  reward_risk_ratio: 2.0
  max_daily_loss_pct: 0.05
  max_position_pct: 0.50
  max_open_positions: 3
  max_orders_per_day: 10
  max_order_notional: 1000.0

account:
  starting_equity: 1000.0
  currency: USD

broker:
  account_label: agentic
  allow_live: false
  settlement_days: 1
  trade_when_cash_available: true

logging:
  path: logs/decisions.jsonl
  paper_state_path: logs/paper_state.json

loop:
  interval_seconds: 300
