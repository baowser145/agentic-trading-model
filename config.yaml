trading_mode: paper
symbols:
# Core mega / liquid (config trade universe)
- SPY
- QQQ
- IWM
- AAPL
- MA
- MSFT
- UNH
- NFLX
- AVGO
- SMH
- JNJ
- ORCL
- NVDA
- V
- AMZN
- META
- GOOGL
- TSLA
- AMD
# Liquid second tier (scan + put-day weak RS focus)
- HOOD
- COIN
- PLTR
- UBER
- DIS
- BA
- CRM
- ARKK
- XLF
- XLE

strategy:
  name: day_trade_playbook
  market_symbol: SPY
  sma_period: 10
  lookback_bars: 30
  range_lookback: 8
  pullback_tol_pct: 0.004
  # R1: don't soft-exit on first market-red tick (paper autopsy fix)
  market_red_exit_ticks: 2
  soft_exit_min_hold_ticks: 2
  market_red_sma_buffer_pct: 0.001
  # R2: block re-entry after market-red soft-exit
  reentry_cooldown_ticks: 3
selector:
  enabled: true
  max_new_entries_per_tick: 2
  prefer_relative_strength: true
  rs_lookback: 10
research:
  provider: spacexai
  model: grok-4.5
daily_focus:
  enabled: true
  path: logs/daily_focus.json
  count: 3
risk:
  risk_per_trade_pct: 0.05
  reward_risk_ratio: 2.0
  max_daily_loss_pct: 0.05
  max_position_pct: 0.5
  max_open_positions: 3
  max_orders_per_day: 40
  max_order_notional: 1000.0
account:
  starting_equity: 1000.0
  currency: USD
broker:
  account_label: agentic
  allow_live: false
  agentic_account_number: '616665162'
  settlement_days: 1
  # Live 2026-07-17 lesson: RH cash can show full after option closes while
  # buying_power lags (settlement / BP). Paper defaults to settled-only buys
  # so we cannot thrash-redeploy unsettled proceeds same day.
  trade_when_cash_available: false
live:
  portfolio_path: logs/live_portfolio.json
  proposal_path: logs/option_proposal.json
  max_option_premium: 100.0
  max_option_contracts: 1
  min_dte: 7
  max_dte: 31
  # Daily long-premium manage rules (user 2026-07-17)
  # Note: -10% option stop is tight (BAC noise risk); user chose it over -40/-50%.
  option_take_profit_pct_low: 0.10   # sell when premium +10%
  option_take_profit_pct_high: 0.20  # or up to +20%
  option_stop_loss_pct: 0.10         # sell when premium -10%
  option_exit_dte: 3                 # force manage/exit by 3 DTE
  # User override 2026-07-17: allow second concurrent long-premium (was 1).
  max_open_options: 2
  # Account day kill (same as risk.max_daily_loss_pct): no new trades if day ≤ -5%
  # Standing user auth (2026-07-17): place Agentic long-premium when playbook gates pass
  # (no per-trade "yes"). Still: Agentic only, BP free, max_open_options, day halt, review first.
  options_place_without_confirm: true
logging:
  path: logs/decisions.jsonl
  paper_state_path: logs/paper_state.json
loop:
  interval_seconds: 300
