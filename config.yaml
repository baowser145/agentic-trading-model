trading_mode: paper
symbols:
- SPY
- AAPL
- MA
- MSFT
- UNH
- NFLX
- AVGO
- SMH
- JNJ
- ORCL
- NVDA
- V
- AMZN
- META
- GOOGL
- QQQ
strategy:
  name: day_trade_playbook
  market_symbol: SPY
  sma_period: 10
  lookback_bars: 30
  range_lookback: 8
  pullback_tol_pct: 0.004
  # R1: don't soft-exit on first market-red tick (paper autopsy fix)
  market_red_exit_ticks: 2
  soft_exit_min_hold_ticks: 2
  market_red_sma_buffer_pct: 0.001
  # R2: block re-entry after market-red soft-exit
  reentry_cooldown_ticks: 3
selector:
  enabled: true
  max_new_entries_per_tick: 2
  prefer_relative_strength: true
  rs_lookback: 10
research:
  provider: spacexai
  model: grok-4.5
daily_focus:
  enabled: true
  path: logs/daily_focus.json
  count: 3
risk:
  risk_per_trade_pct: 0.05
  reward_risk_ratio: 2.0
  max_daily_loss_pct: 0.05
  max_position_pct: 0.5
  max_open_positions: 3
  max_orders_per_day: 40
  max_order_notional: 1000.0
account:
  starting_equity: 1000.0
  currency: USD
broker:
  account_label: agentic
  allow_live: false
  agentic_account_number: '616665162'
  settlement_days: 1
  trade_when_cash_available: true
live:
  portfolio_path: logs/live_portfolio.json
  proposal_path: logs/option_proposal.json
  max_option_premium: 100.0
  max_option_contracts: 1
  min_dte: 7
  max_dte: 31
logging:
  path: logs/decisions.jsonl
  paper_state_path: logs/paper_state.json
loop:
  interval_seconds: 300
