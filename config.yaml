# Default: paper only. Live requires explicit mode + agent-mediated execution.
trading_mode: paper  # paper | live

# Universe: liquid ETFs. SPY is also the market filter.
symbols:
  - SPY
  - QQQ
  - IWM

strategy:
  # Riskier day-trade playbook: market filter + breakout/pullback + stop/2R
  name: day_trade_playbook
  market_symbol: SPY
  sma_period: 10
  lookback_bars: 30
  range_lookback: 8
  pullback_tol_pct: 0.004

risk:
  # YOU CHOSE RISKY: 5% equity risk if stop hits; 5% daily loss kill switch
  risk_per_trade_pct: 0.05
  reward_risk_ratio: 2.0          # take-profit at 2R
  max_daily_loss_pct: 0.05        # stop trading day when down 5%
  max_position_pct: 0.50          # single name cap vs equity
  max_open_positions: 3
  max_orders_per_day: 10
  max_order_notional: 1000.0      # hard cap per order (full small account)

account:
  starting_equity: 1000.0
  currency: USD

broker:
  account_label: agentic
  allow_live: false
  settlement_days: 1
  trade_when_cash_available: true

logging:
  path: logs/decisions.jsonl
  paper_state_path: logs/paper_state.json

loop:
  interval_seconds: 300
